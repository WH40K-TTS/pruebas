<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <script>
      // SPA redirect hack for GitHub Pages
      // Redirige rutas desconocidas al index.html preservando la ruta como query param
      var segmentCount = 1 // número de segmentos de la base URL (e.g. /tts-tournaments/ → 1)
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + segmentCount)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(segmentCount)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
