<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>WH40K-TTS</title>
  <script>
    // Redirect SPA routes to index.html for GitHub Pages
    // Preserves path, query, and hash
    const repo = location.pathname.split('/')[1]
    const path = location.pathname.slice(repo.length + 1) || '/'
    const search = location.search
    const hash = location.hash
    location.replace(
      '/' + repo + '/?p=' + encodeURIComponent(path + search) + hash
    )
  </script>
</head>
<body></body>
</html>
